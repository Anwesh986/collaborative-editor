# Production Configuration (PostgreSQL Database)
spring.application.name=collaborative-editor

# PostgreSQL Database Configuration
# These will be replaced by environment variables in production
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/collaborative_editor}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Disable H2 console in production
spring.h2.console.enabled=false

# Don't run SQL scripts in production (data already exists)
spring.sql.init.mode=never

# Email Configuration (use environment variables)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Server Configuration
server.port=${PORT:8080}

# CORS Configuration (frontend URL)
spring.web.cors.allowed-origins=${FRONTEND_URL:https://your-frontend-domain.com}

# Security Headers
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# Logging
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
