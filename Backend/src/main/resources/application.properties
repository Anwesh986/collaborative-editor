# Active Profile Configuration
# Use 'dev' for local development with H2
# Use 'prod' for production with PostgreSQL
spring.profiles.active=${SPRING_PROFILE:dev}

# Common Configuration
spring.application.name=collaborative-editor

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for development - access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# SQL Script Configuration
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# Gmail SMTP configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
